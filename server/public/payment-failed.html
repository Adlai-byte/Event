<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: white;
        }
        h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 12px;
        }
        p {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .button {
            background: #ef4444;
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-right: 12px;
        }
        .button:hover {
            background: #dc2626;
        }
        .button-secondary {
            background: #6b7280;
        }
        .button-secondary:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">✕</div>
        <h1>Payment Failed</h1>
        <p id="message">Your payment could not be processed. Please try again or contact support if the problem persists.</p>
        <a href="#" class="button" onclick="retryPayment()">Try Again</a>
        <a href="#" class="button button-secondary" onclick="goBack()">Return to App</a>
    </div>

    <script>
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function getFrontendUrl() {
            // Try to get frontend URL from referrer first
            if (document.referrer) {
                try {
                    const referrerUrl = new URL(document.referrer);
                    // If referrer is from a different port (likely the frontend), use it
                    if (referrerUrl.port !== window.location.port) {
                        return referrerUrl.origin;
                    }
                } catch (e) {
                    console.log('Could not parse referrer');
                }
            }
            
            // If no referrer or same port, try common frontend ports
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const currentPort = window.location.port;
            
            if (currentPort === '3001') {
                // Backend is on 3001, redirect to frontend on port 8081
                return `${protocol}//${hostname}:8081`;
            } else {
                // Same origin, just go to root
                return `${protocol}//${hostname}${currentPort ? ':' + currentPort : ''}`;
            }
        }

        function retryPayment() {
            // Redirect to frontend app (user can retry from bookings page)
            window.location.href = getFrontendUrl();
        }

        function goBack() {
            // Try to close the window (for popups) or redirect
            if (window.opener) {
                // If opened in popup, send message and close
                window.opener.postMessage({ 
                    type: 'payment_failed', 
                    bookingId: getUrlParam('bookingId') 
                }, '*');
                window.close();
            } else {
                // Redirect to frontend app homepage
                window.location.href = getFrontendUrl();
            }
        }

        // Update message if provided
        const message = getUrlParam('message');
        if (message) {
            document.getElementById('message').textContent = decodeURIComponent(message);
        }
    </script>
</body>
</html>
